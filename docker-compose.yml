name: photovault

x-wordpress-environment: &wordpress-environment
  WORDPRESS_DB_HOST: db:3306
  WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-photovault}
  WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-photovault}
  WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?Set WORDPRESS_DB_PASSWORD in .env}
  WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
  WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-0}
  WORDPRESS_FORCE_SSL_ADMIN: ${WORDPRESS_FORCE_SSL_ADMIN:-0}
  WORDPRESS_MAIL_FROM: ${WORDPRESS_MAIL_FROM:-wordpress@photovault.local}
  WORDPRESS_MAIL_FROM_NAME: ${WORDPRESS_MAIL_FROM_NAME:-PhotoVault}
  PHOTOVAULT_ENV: ${PHOTOVAULT_ENV:-development}
  WORDPRESS_AUTH_KEY: ${WORDPRESS_AUTH_KEY:?Set WORDPRESS_AUTH_KEY in .env}
  WORDPRESS_SECURE_AUTH_KEY: ${WORDPRESS_SECURE_AUTH_KEY:?Set WORDPRESS_SECURE_AUTH_KEY in .env}
  WORDPRESS_LOGGED_IN_KEY: ${WORDPRESS_LOGGED_IN_KEY:?Set WORDPRESS_LOGGED_IN_KEY in .env}
  WORDPRESS_NONCE_KEY: ${WORDPRESS_NONCE_KEY:?Set WORDPRESS_NONCE_KEY in .env}
  WORDPRESS_AUTH_SALT: ${WORDPRESS_AUTH_SALT:?Set WORDPRESS_AUTH_SALT in .env}
  WORDPRESS_SECURE_AUTH_SALT: ${WORDPRESS_SECURE_AUTH_SALT:?Set WORDPRESS_SECURE_AUTH_SALT in .env}
  WORDPRESS_LOGGED_IN_SALT: ${WORDPRESS_LOGGED_IN_SALT:?Set WORDPRESS_LOGGED_IN_SALT in .env}
  WORDPRESS_NONCE_SALT: ${WORDPRESS_NONCE_SALT:?Set WORDPRESS_NONCE_SALT in .env}

x-wordpress-volumes: &wordpress-volumes
  - ./:/var/www/html
  - ./docker/wp-config-docker.php:/var/www/html/wp-config.php:ro
  - ./docker/php/php.ini:/usr/local/etc/php/conf.d/photovault.ini:ro
  - ./docker/wordpress:/opt/photovault/mu-plugins:ro

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PHOTOVAULT_HTTP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -qx ok"]
      interval: 30s
      timeout: 5s
      retries: 5

  wordpress:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    environment: *wordpress-environment
    volumes: *wordpress-volumes
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@fsockopen(\"127.0.0.1\", 9000) ? 0 : 1);'"]
      interval: 15s
      timeout: 5s
      retries: 10

  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME:-photovault}
      MARIADB_USER: ${WORDPRESS_DB_USER:-photovault}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?Set WORDPRESS_DB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD in .env}
    volumes:
      - photovault-db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.20
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8025/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_healthy
    environment: *wordpress-environment
    volumes:
      - ./:/var/www/html
      - ./docker/wp-config-docker.php:/var/www/html/wp-config.php:ro
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/photovault.ini:ro
      - ./docker/cron/run.sh:/usr/local/bin/photovault-cron:ro
      - ./docker/wordpress:/opt/photovault/mu-plugins:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/photovault-cron"]
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 60s
      timeout: 15s
      retries: 3

volumes:
  photovault-db:
