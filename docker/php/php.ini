file_uploads=On
upload_max_filesize=64M
post_max_size=72M
memory_limit=256M
max_execution_time=120
max_input_vars=3000
sendmail_path="/usr/bin/msmtp -t"
opcache.enable=1
opcache.validate_timestamps=1
expose_php=Off
display_errors=Off
log_errors=On
session.cookie_httponly=1
session.cookie_samesite=Lax
